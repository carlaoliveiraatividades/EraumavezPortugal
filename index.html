<!doctype html>
<html lang="pt" style="height: 100%; margin: 0;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>História de Portugal para Crianças</title>
    <!-- Tailwind CSS modern styling via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600;850&family=JetBrains+Mono:wght@500;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet" />
    
    <!-- Lucide Icons for high quality indicators -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- LOAD THE SEPARATED DATABASE (Eras, Heroes, 15 Poems, 7 Caravel levels) -->
    <script src="/data.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600;850&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #F8FAFC;
        }

        .heading-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* 3D Azulejo Portuguese Card Styling */
        .azulejo-card {
            background-color: #FFFFFF;
            border: 4px solid #0284C7;
            border-radius: 24px;
            box-shadow: 0 8px 0px #0284C7;
            transition: all 0.15s ease-in-out;
        }
        .azulejo-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 0px #0284C7;
        }

        .royal-card {
            background-color: #FFFFFF;
            border: 4px solid #D97706;
            border-radius: 24px;
            box-shadow: 0 8px 0px #B45309;
            transition: all 0.15s ease-in-out;
        }
        .royal-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 0px #B45309;
        }

        .heraldry-card {
            background-color: #FFFFFF;
            border: 4px solid #DA291C;
            border-radius: 24px;
            box-shadow: 0 8px 0px #991B1B;
            transition: all 0.15s ease-in-out;
        }

        /* Floating effect for visual characters */
        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .float-anim {
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes wave-motion {
            0% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(-10px) translateY(4px); }
            100% { transform: translateX(0) translateY(0); }
        }
        .wave-anim {
            animation: wave-motion 6s ease-in-out infinite;
        }

        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col selection:bg-rose-200">

    <!-- Top HUD Banner -->
    <header class="bg-white border-b-6 border-[#FFD93D] sticky top-0 z-40 shadow-sm px-4 py-3 md:py-4 rounded-b-[28px] mx-0 md:mx-4 mt-0 md:mt-2">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <div onclick="openProfileModal(false)" class="w-12 h-12 bg-gradient-to-tr from-amber-400 to-red-650 rounded-full flex items-center justify-center text-2xl shadow-md border-2 border-white shrink-0 cursor-pointer hover:scale-110 active:scale-95 duration-100 float-anim" id="hud-avatar-box">
                    <span id="hud-avatar-icon">👑</span>
                </div>
                <div class="text-center sm:text-left cursor-pointer" onclick="openProfileModal(false)">
                    <h1 class="text-base md:text-lg font-black text-[#046A38] heading-font tracking-tight flex items-center justify-center sm:justify-start gap-1">
                        Olá, <span id="hud-student-name" class="text-[#DA291C]">Recruta</span> ✨
                    </h1>
                    <span class="text-[9px] md:text-xs font-bold text-slate-400 block tracking-wide uppercase mt-0.5 hover:text-slate-600 transition-colors">🏰 Ver/Editar Perfil Real</span>
                </div>
            </div>

            <!-- Bento HUD Progress Panel -->
            <div class="flex items-center gap-3.5 bg-white border-3 border-[#86EFAC] rounded-2xl px-4 py-1.5 shadow-sm">
                <div class="text-center">
                    <span class="text-[8px] font-black uppercase text-slate-400 tracking-wider">Cargo Real</span>
                    <p id="hud-level-title" class="text-[11px] font-black text-[#046A38] leading-none mt-0.5">Grão-Vassalo</p>
                </div>
                <div class="w-0.5 h-5 bg-slate-200 rounded-full"></div>
                <div class="text-center">
                    <span class="text-[8px] font-black uppercase text-slate-400 tracking-wider">Nível</span>
                    <p id="hud-level-num" class="text-xs font-black text-[#DA291C] leading-none mt-0.5">1</p>
                </div>
                <div class="w-0.5 h-5 bg-slate-200 rounded-full"></div>
                <div class="flex items-center gap-1 font-bold">
                    <span class="text-sm">🪙</span>
                    <span id="hud-xp-points" class="text-xs font-black text-[#046A38]">0 XP</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Container containing Bento layout -->
    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6 space-y-6">
        
        <!-- Viewport placeholder section loaded dynamically by Render -->
        <section id="viewport" class="transition-all duration-200 min-h-[480px]">
            <!-- Dynamic pages will load here -->
        </section>

    </main>

    <!-- Bottom Navigation Bar with Azulejo aesthetics -->
    <nav class="bg-white border-t-6 border-[#FFD93D] sticky bottom-0 z-40 shadow-xl px-2 py-2 md:py-3.5 rounded-t-[32px] mx-0 md:mx-4">
        <div class="max-w-2xl mx-auto flex items-center justify-around gap-1">
            <button onclick="changeTab('timeline')" id="nav-timeline" class="flex flex-col items-center gap-1 text-slate-400 py-1 px-3.5 rounded-xl transition-all duration-150 hover:bg-slate-100">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-wider">Tempo</span>
            </button>
            <button onclick="changeTab('map')" id="nav-map" class="flex flex-col items-center gap-1 text-slate-400 py-1 px-3.5 rounded-xl transition-all duration-150 hover:bg-slate-100">
                <i data-lucide="compass" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-wider">Mapa</span>
            </button>
            <button onclick="changeTab('chat')" id="nav-chat" class="flex flex-col items-center gap-1 text-slate-400 py-1 px-3.5 rounded-xl transition-all duration-150 hover:bg-slate-100 relative">
                <i data-lucide="message-square" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-wider">Herois</span>
                <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-[#DA291C] rounded-full animate-ping"></span>
            </button>
            <button onclick="changeTab('games')" id="nav-games" class="flex flex-col items-center gap-1 text-slate-400 py-1 px-3.5 rounded-xl transition-all duration-150 hover:bg-slate-100">
                <i data-lucide="gamepad-2" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-wider">Jogos</span>
            </button>
            <button onclick="changeTab('rewards')" id="nav-rewards" class="flex flex-col items-center gap-1 text-slate-400 py-1 px-3.5 rounded-xl transition-all duration-150 hover:bg-slate-100">
                <i data-lucide="trophy" class="w-5 h-5"></i>
                <span class="text-[9px] font-black uppercase tracking-wider">Gabinete</span>
            </button>
        </div>
    </nav>

    <!-- REGISTRATION MODAL (For Student Name and Avatar selection) -->
    <div id="registration-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white border-6 border-[#FFD93D] rounded-[32px] p-6 max-w-lg w-full text-center space-y-6 shadow-2xl relative overflow-hidden float-anim">
            <div class="absolute top-0 left-0 right-0 h-4 bg-gradient-to-r from-red-500 via-yellow-400 to-green-600"></div>
            
            <button id="close-reg-btn" onclick="closeProfileModal()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-600 text-lg font-black hidden">✕</button>

            <div class="space-y-2">
                <div class="text-5xl">🏰🛡️⚔️</div>
                <h2 class="text-2xl font-black text-slate-800 heading-font tracking-tight mt-2" id="reg-title">Registo Real de Recruta</h2>
                <p class="text-xs text-slate-500 font-semibold max-w-sm mx-auto leading-relaxed">
                    Benvindo ao portal educativo da nossa História! Escreve o teu nome de fidalgo e escolhe o teu avatar de herói!
                </p>
            </div>

            <div class="space-y-2 text-left">
                <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest block pl-1">O Teu Nome de Cavaleiro / Donzela:</label>
                <input type="text" id="reg-student-name-input" placeholder="Ex: Carlos o Destemido, Ana das Rosas..." class="w-full bg-slate-50 border-3 border-[#FFD93D] rounded-2xl px-4 py-3 text-sm font-black text-slate-800 focus:outline-none focus:ring-4 focus:ring-yellow-200 focus:border-yellow-500" maxlength="30">
            </div>

            <div class="space-y-2 text-left">
                <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest block pl-1">Escolhe o teu Avatar de Aventura:</label>
                <div class="grid grid-cols-4 sm:grid-cols-7 gap-2.5" id="reg-avatar-grid">
                    <!-- Loaded dynamically -->
                </div>
            </div>

            <div id="reg-error-msg" class="text-xs text-red-500 font-bold hidden">⚠️ Por favor, escreve o teu nome e escolhe um avatar!</div>

            <button onclick="confirmRegistration()" class="w-full bg-[#046A38] hover:bg-[#15803d] border-b-6 border-[#14532d] text-white font-extrabold text-xs tracking-wider uppercase py-3.5 rounded-2xl transition-all shadow-md active:translate-y-1">
                Hastear Bandeira & Entrar! 🇵🇹✨
            </button>
        </div>
    </div>

    <!-- Client application Core logic -->
    <script>
        // State manager matching our system
        const state = {
            activeTab: "timeline",
            points: 0,
            selectedEraId: "fundacao",
            activeEventIdx: 0,
            selectedSpot: null,
            selectedCharKey: "afonso_henriques",
            chatMessages: {},
            chatIsLoading: false,
            apiError: null,
            isSpeaking: false,
            
            studentName: "",
            studentAvatar: "👑",

            activeGame: "quiz",
            quizSelectedEra: "fundacao",
            quizCurrentIdx: 0,
            quizSelectedOption: null,
            quizIsAnswered: false,
            quizScore: 0,
            quizShowSummary: false,
            
            // Advanced naval simulation variables
            oceanStep: 0,
            oceanHp: 3,
            oceanFood: 100,
            oceanCrew: 100,
            oceanWind: 100,
            oceanIsGameOver: false,
            oceanIsGameWon: false,
            oceanLog: "Sais do Tejo com as velas cheias! Próximo destino: Ilha da Madeira.",
            
            poetryPoemIdx: 0,
            poetrySelectedWord: null,
            poetrySolved: false,
            poetryPointsGiven: false,
            
            shieldColor: "bg-[#DA291C] border-[#B45309] text-yellow-300",
            shieldSymbol: "🛡️",
            shieldBgLabel: "Vermelho Real",
            shieldName: "Escudo do Pequeno Cavaleiro",

            // Character friendship levels
            heroFriendship: {
                afonso_henriques: 0,
                camoes: 0,
                vasco_da_gama: 0,
                maria_ii: 0,
                fernando_pessoa: 0
            }
        };

        const LIST_AVATARS = [
            { emoji: "👑", title: "Monarca" },
            { emoji: "⛵", title: "Navegador" },
            { emoji: "⚔️", title: "Guarda" },
            { emoji: "✍️", title: "Escrivão" },
            { emoji: "🌹", title: "Alquimista" },
            { emoji: "🦁", title: "Leão Coimbra" },
            { emoji: "🦉", title: "Sábio" }
        ];

        let selectedRegAvatar = "👑";
        let achievements = [];

        // Audio System via Web Audio API 
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === "suspended") {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playBeep(freq, type, duration, vol = 0.1) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(vol, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        function playClickSound() {
            playBeep(450, "sine", 0.08, 0.15);
        }
        function playSuccessSound() {
            playBeep(523.25, "triangle", 0.15, 0.12);
            setTimeout(() => playBeep(659.25, "triangle", 0.25, 0.12), 100);
        }
        function playFailSound() {
            playBeep(220, "sawtooth", 0.25, 0.1);
        }
        function playAchievementSound() {
            // Trumpet Fanfare
            const notes = [440, 554, 659, 880];
            notes.forEach((f, i) => {
                setTimeout(() => playBeep(f, "sine", 0.4, 0.15), i * 150);
            });
        }
        function playWaveSound() {
            try {
                const ctx = getAudioContext();
                const bufferSize = ctx.sampleRate * 1.5;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const filter = ctx.createBiquadFilter();
                filter.type = "lowpass";
                filter.frequency.setValueAtTime(400, ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 1.2);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 1.4);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                noise.start();
            } catch(e){}
        }

        // SAVE & LOAD LOCAL STORAGE
        function saveProgress() {
            try {
                localStorage.setItem("portugal_hist_points_onefile", String(state.points));
                localStorage.setItem("portugal_hist_achievements_onefile", JSON.stringify(achievements));
                localStorage.setItem("portugal_student_name", state.studentName);
                localStorage.setItem("portugal_student_avatar", state.studentAvatar);
                localStorage.setItem("portugal_shield_color", state.shieldColor);
                localStorage.setItem("portugal_shield_symbol", state.shieldSymbol);
                localStorage.setItem("portugal_shield_bg_label", state.shieldBgLabel);
                localStorage.setItem("portugal_shield_name", state.shieldName);
                localStorage.setItem("portugal_hero_friendship", JSON.stringify(state.heroFriendship));
            } catch (e) {
                console.warn("Storage save failed:", e);
            }
        }

        function loadProgress() {
            try {
                const points = localStorage.getItem("portugal_hist_points_onefile");
                const achs = localStorage.getItem("portugal_hist_achievements_onefile");
                const name = localStorage.getItem("portugal_student_name");
                const avatar = localStorage.getItem("portugal_student_avatar");
                const shieldColor = localStorage.getItem("portugal_shield_color");
                const shieldSymbol = localStorage.getItem("portugal_shield_symbol");
                const shieldBgLabel = localStorage.getItem("portugal_shield_bg_label");
                const shieldName = localStorage.getItem("portugal_shield_name");
                const friendship = localStorage.getItem("portugal_hero_friendship");

                if (points) state.points = parseInt(points, 10);
                if (name) state.studentName = name;
                if (avatar) state.studentAvatar = avatar;
                if (shieldColor) state.shieldColor = shieldColor;
                if (shieldSymbol) state.shieldSymbol = shieldSymbol;
                if (shieldBgLabel) state.shieldBgLabel = shieldBgLabel;
                if (shieldName) state.shieldName = shieldName;
                if (friendship) state.heroFriendship = JSON.parse(friendship);

                if (achs) {
                    achievements = JSON.parse(achs);
                } else {
                    resetAchievementsToDefault();
                }
            } catch (e) {
                resetAchievementsToDefault();
            }
            updateHUD();
        }

        function resetAchievementsToDefault() {
            achievements = [
                { id: "coroa_afonso", title: "Cavaleiro do Reino", description: "Termina o Quiz da Fundação de Portugal e recebe a coroa de D. Afonso Henriques!", icon: "👑", unlocked: false, points: 100, badgeColor: "bg-amber-500", category: "quiz" },
                { id: "mestre_caravela", title: "Navegador dos Sete Mares", description: "Ajuda Vasco da Gama a guiar a sua caravela à Índia batendo todos os desafios!", icon: "⛵", unlocked: false, points: 150, badgeColor: "bg-sky-500", category: "ocean" },
                { id: "poeta_estrelas", title: "Mestre da Lira e do Verso", description: "Completa todos os enigmas poéticos e decifra os 15 poemas mágicos nacionais!", icon: "✍️", unlocked: false, points: 180, badgeColor: "bg-purple-500", category: "poetry" },
                { id: "conversa_imperio", title: "Braço Direito Real", description: "Alcança o maior grau de amizade com qualquer um dos heróis do império!", icon: "💬", unlocked: false, points: 100, badgeColor: "bg-emerald-500", category: "chat" },
                { id: "explorador_tempo", title: "Explorador de Séculos", description: "Explora todas as 5 eras na linha do tempo para te tornares um mestre da História!", icon: "⏳", unlocked: false, points: 120, badgeColor: "bg-rose-500", category: "timeline" }
            ];
        }

        function addPoints(pts) {
            state.points += pts;
            updateHUD();
            saveProgress();
        }

        function unlockAchievement(id) {
            let found = achievements.find(a => a.id === id);
            if (found && !found.unlocked) {
                found.unlocked = true;
                state.points += found.points;
                playAchievementSound();
                updateHUD();
                saveProgress();
                let notice = document.createElement("div");
                notice.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-amber-500 text-white font-black px-6 py-3 rounded-full shadow-2xl border-4 border-white text-xs z-50 animate-bounce cursor-pointer";
                notice.innerHTML = `🏆 CONQUISTA REAL: Desbloqueaste "${found.title}" (+${found.points} XP)! VER NO GABINETE`;
                notice.onclick = () => { changeTab('rewards'); notice.remove(); };
                document.body.appendChild(notice);
                setTimeout(() => notice.remove(), 7000);
            }
        }

        function updateHUD() {
            const currentLevel = Math.floor(state.points / 100) + 1;
            const levelTitles = ["Grão-Vassalo", "Fidalgo", "Navegador", "Conde", "Duque"];
            const levelTitleTarget = currentLevel >= 5 ? "Duque" : levelTitles[currentLevel - 1] || "Grão-Vassalo";

            document.getElementById("hud-level-title").innerText = levelTitleTarget;
            document.getElementById("hud-level-num").innerText = currentLevel;
            document.getElementById("hud-xp-points").innerText = `${state.points} XP`;
            
            document.getElementById("hud-avatar-icon").innerText = state.studentAvatar || "👑";
            document.getElementById("hud-student-name").innerText = state.studentName || "Recruta";
        }

        // TAB SWITCH LOGIC
        function changeTab(tabId) {
            state.activeTab = tabId;
            playClickSound();

            const tabs = ["timeline", "map", "chat", "games", "rewards"];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if (btn) {
                    if (t === tabId) {
                        btn.className = "flex flex-col items-center gap-1 text-[#046A38] py-1 px-3.5 rounded-xl transition-all duration-150 bg-green-50 scale-105 border-b-3 border-[#046A38]";
                    } else {
                        btn.className = "flex flex-col items-center gap-1 text-slate-400 py-1 px-3.5 rounded-xl transition-all duration-150 hover:bg-slate-100";
                    }
                }
            });

            render();
            lucide.createIcons();
        }

        // PROFILE REGISTRATION / EDIT POPUP
        function openProfileModal(forceReg = false) {
            document.getElementById("registration-modal").classList.remove("hidden");
            document.getElementById("reg-student-name-input").value = state.studentName || "";
            selectedRegAvatar = state.studentAvatar || "👑";
            
            if (forceReg) {
                document.getElementById("close-reg-btn").classList.add("hidden");
                document.getElementById("reg-title").innerText = "Recruta de Cavalaria";
            } else {
                document.getElementById("close-reg-btn").classList.remove("hidden");
                document.getElementById("reg-title").innerText = "Editar Perfil Real";
            }
            
            renderAvatarGrid();
            playClickSound();
        }

        function closeProfileModal() {
            document.getElementById("registration-modal").classList.add("hidden");
            playClickSound();
        }

        function renderAvatarGrid() {
            const grid = document.getElementById("reg-avatar-grid");
            grid.innerHTML = LIST_AVATARS.map(av => `
                <button onclick="selectRegAvatar('${av.emoji}')" class="p-2 border-3 text-2xl flex flex-col items-center justify-center rounded-xl transition-all duration-150 ${
                    selectedRegAvatar === av.emoji ? "border-amber-500 bg-amber-50 scale-110 shadow" : "border-slate-150 hover:bg-slate-100"
                }">
                    <span>${av.emoji}</span>
                    <span class="text-[7px] font-black uppercase text-slate-400 mt-1 truncate max-w-[48px]">${av.title}</span>
                </div>
            `).join("");
        }

        function selectRegAvatar(emoji) {
            selectedRegAvatar = emoji;
            playBeep(550, "sine", 0.05);
            renderAvatarGrid();
        }

        function confirmRegistration() {
            const nameIn = document.getElementById("reg-student-name-input").value.trim();
            if (!nameIn) {
                const em = document.getElementById("reg-error-msg");
                em.classList.remove("hidden");
                playFailSound();
                return;
            }
            document.getElementById("reg-error-msg").classList.add("hidden");
            state.studentName = nameIn;
            state.studentAvatar = selectedRegAvatar;
            saveProgress();
            updateHUD();
            closeProfileModal();
            playSuccessSound();
            render();
        }

        // --- SUBVIEW 1: TIMELINE ---
        function renderTimeline(parent) {
            const era = HISTORICAL_ERAS.find(e => e.id === state.selectedEraId);
            
            let eraButtons = HISTORICAL_ERAS.map(e => `
                <button onclick="timelineSelectEra('${e.id}')" class="px-4 py-2.5 rounded-2xl text-[11px] font-black heading-font border-3 transition-all shrink-0 cursor-pointer ${
                    state.selectedEraId === e.id ? "bg-[#046A38] border-[#14532d] text-white shadow-md transform scale-102" : "bg-white border-slate-200 text-slate-700 hover:bg-slate-100"
                }">
                    ${e.title}
                </button>
            `).join("");

            let eventListHtml = era.events.map((evt, idx) => `

        async function chatSendMessage() {
            const input = document.getElementById("chat-prompt-input");
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            await chatHandleQuery(text);

        async function chatHandleQuery(promptText) {
            if (state.chatIsLoading) return;
            playClickSound();

            if (!state.chatMessages[state.selectedCharKey]) {
                const char = HISTORICAL_CHARACTERS.find(c => c.key === state.selectedCharKey);
                state.chatMessages[state.selectedCharKey] = [
                    { role: "assistant", text: char.greeting }
                ];
            }

            // Append user prompt item
            state.chatMessages[state.selectedCharKey].push({ role: "user", text: promptText });
            state.chatIsLoading = true;
            state.apiError = null;
            render();

            // Dynamic increase relationship status (up to 100)
            const currentF = state.heroFriendship[state.selectedCharKey] || 0;
            state.heroFriendship[state.selectedCharKey] = Math.min(100, currentF + 12);
            saveProgress();

            if (state.heroFriendship[state.selectedCharKey] >= 95) {
                unlockAchievement("conversa_imperio");
            }

            try {
                // Compile dynamic history sequence for post call
                const history = [];
                const rawM = state.chatMessages[state.selectedCharKey];
                // Take up to last 4 turns for memory context strength
                const sliceStart = Math.max(0, rawM.length - 5);
                rawM.slice(sliceStart, rawM.length - 1).forEach(m => {
                    history.push({ role: m.role, text: m.text });
                });

                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        character: state.selectedCharKey,
                        prompt: promptText,
                        history: history,
                        studentName: state.studentName,
                        studentAvatar: state.studentAvatar,
                        shieldName: state.shieldName,
                        shieldSymbol: state.shieldSymbol
                    })
                });

                const data = await response.json();
                
                if (data.reply) {
                    state.chatMessages[state.selectedCharKey].push({ role: "assistant", text: data.reply });
                    autoSpeakReply(data.reply);
                } else {
                    state.chatMessages[state.selectedCharKey].push({ 
                        role: "assistant", 
                        text: "Desculpa, fidalgo, as minhas cartas medievais ficaram húmidas e perdi a memória! Tenta de novo." 
                    });
                }
            } catch(e) {
                console.error("Chat failure:", e);
                // Child manual offline fallback simulation response
                const fallbacks = [
                    "A minha pena quebrou-se! Que dotes tens para me contar duma boa lenda real?",
                    "Os mares estão revoltos e a ligação espiritual falhou! Pergunta-me sobre Guimarães e os reis heróis!",
                    "Desejas que eu esculpa um tratado sobre o vosso brasão real? Repete comigo: Tudo vale a pena!"
                ];
                const rand = fallbacks[Math.floor(Math.random() * fallbacks.length)];
                state.chatMessages[state.selectedCharKey].push({ role: "assistant", text: rand });
            } finally {
                state.chatIsLoading = false;
                render();
            }
        }

        function chatToggleSpeak() {
            state.isSpeaking = !state.isSpeaking;
            if (!state.isSpeaking && window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            playClickSound();
            render();
        }

        function autoSpeakReply(text) {
            if (!state.isSpeaking || !window.speechSynthesis) return;
            try {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = "pt-PT";
                const voices = window.speechSynthesis.getVoices();
                // Select a Portuguese voice if available
                const ptVoice = voices.find(v => v.lang.startsWith("pt") || v.lang.includes("Portugal"));
                if (ptVoice) utter.voice = ptVoice;
                utter.rate = 1.05;
                window.speechSynthesis.speak(utter);
            } catch(e) {}
        }

                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between text-[8px] font-black uppercase text-emerald-850 max-w-full truncate"><span>⚓ Moral Tripulação:</span> <span>${state.oceanCrew}%</span></div>
                            <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full bg-emerald-600 rounded-full transition-all" style="width: ${state.oceanCrew}%"></div>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between text-[8px] font-black uppercase text-sky-850 max-w-full truncate"><span>💨 Força Vento:</span> <span>${state.oceanWind}%</span></div>
                            <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full bg-sky-505 rounded-full transition-all" style="width: ${state.oceanWind}%"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Wave simulation display -->
                    <div class="bg-[#E0F2FE]/60 rounded-2xl border-2 border-sky-100 h-28 flex justify-center items-center relative overflow-hidden select-none">
                        <span class="text-[54px] animate-[floating_3.5s_infinite_ease-after] block relative z-10 wave-anim">⛵</span>
                        <span class="absolute bottom-1 right-2 px-1.5 py-0.5 text-[8.5px] font-mono bg-white/80 border border-slate-200 rounded leading-none">Ponto Náutico: ${state.oceanStep + 1}</span>
                    </div>

                    <div class="space-y-1 text-left">
                        <h4 class="text-xs font-black text-sky-950 uppercase select-none">${current.title}</h4>
                        <p class="text-[11.5px] text-slate-700 bg-slate-50 border-2 border-dashed p-3 rounded-xl leading-relaxed font-semibold italic">"${current.question}"</p>
                    </div>

                    <div class="space-y-2.5">
                        ${choicesHtml}
                    </div>

                    <!-- Sea diary logs -->
                    <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl text-sky-450 font-mono text-[9px] leading-relaxed text-left">
                        💻 DIÁRIO DE BORDO: <span class="font-sans font-semibold text-sky-100 leading-normal block mt-1">${state.oceanLog}</span>
                    </div>
                </div>
            `;
        }

        function oceanClickChoice(safe, succ, fail, food, crew, wind) {
            playClickSound();

            if (food) state.oceanFood = Math.max(0, Math.min(100, state.oceanFood + food));
            if (crew) state.oceanCrew = Math.max(0, Math.min(100, state.oceanCrew + crew));
            if (wind) state.oceanWind = Math.max(0, Math.min(100, state.oceanWind + wind));

            if (safe) {
                state.oceanLog = succ;
                playWaveSound();
                if (state.oceanStep + 1 >= SCENARIOS.length) {
                    state.oceanIsGameWon = true;
                    unlockAchievement("mestre_caravela");
                    addPoints(150);
                } else {
                    state.oceanStep++;
                }
            } else {
                state.oceanLog = fail;
                playFailSound();
                state.oceanHp--;
                
                if (state.oceanHp <= 0 || state.oceanFood <= 0 || state.oceanCrew <= 0) {
                    state.oceanIsGameOver = true;
                    if (state.oceanFood <= 0) {
                        state.oceanLog = "Derrota Marítima! Os vossos mantimentos esgotaram-se e os marinheiros caíram de dores de fome!";
                    } else if (state.oceanCrew <= 0) {
                        state.oceanLog = "Derrota Marítima! A tripulação amotinou-se devido a extrema quebra de confiança e falta de moral!";
                    }
                }
            }
            render();
        }

        function oceanRestart() {
            state.oceanStep = 0;
            state.oceanHp = 3;
            state.oceanFood = 100;
            state.oceanCrew = 100;
            state.oceanWind = 100;
            state.oceanIsGameOver = false;
            state.oceanIsGameWon = false;
            state.oceanLog = "Sais do Tejo com as velas cheias! Próximo destino: Ilha da Madeira.";
            playClickSound();
            render();
        }

        // GAME C: ENIGMA DOS POETAS (15 Level puzzle)
        function renderPoetryGame() {
            const current = POEMS[state.poetryPoemIdx];

            let optionsHtml = current.options.map(word => `
                <button onclick="poetrySelectWord('${word}')" class="px-3 py-1.8 rounded-xl text-[10px] md:text-xs font-black border-2 transition-all hover:scale-105 cursor-pointer hover:bg-purple-100 ${
                    state.poetrySelectedWord === word ? "bg-purple-600 text-white border-purple-700 shadow" : "bg-white border-purple-200 text-purple-950"
                }">${word}</button>
            `).join("");

            let firstLine = current.verseLines[1].split("__________")[0];
            let ending = current.verseLines[1].split("__________")[1];

            return `
                <div class="bg-white border-4 border-[#C084FC] rounded-[24px] p-5 space-y-5 shadow-sm">
                    <div class="flex justify-between items-center text-[10px] font-black text-purple-950 border-b pb-2 select-none flex-wrap gap-2">
                        <span class="flex items-center gap-1">✍️ Enigma dos Poetas Nacionais</span>
                        <div class="flex gap-2">
                            <span class="bg-purple-50 text-purple-800 px-1.5 py-0.5 rounded border">Nível ${state.poetryPoemIdx + 1}/${POEMS.length}</span>
                            <span class="bg-amber-50 text-amber-800 px-1.5 py-0.5 rounded border">Autor: ${current.author}</span>
                        </div>
                    </div>

                    <p class="text-[10.5px] md:text-xs text-slate-500 italic text-center font-bold">"${current.context}"</p>

                    <!-- Scroll layout -->
                    <div class="bg-amber-50/50 border-2 border-amber-200 rounded-2xl p-6 shadow-inner text-center space-y-3 relative overflow-hidden max-w-sm mx-auto select-none font-serif">
                        <div class="text-[8px] tracking-wider text-amber-700 font-extrabold mb-1">📜 PERGAMINHO LITERÁRIO</div>
                        
                        <p class="text-xs md:text-sm font-bold italic text-slate-800 leading-snug">"${current.verseLines[0]}"</p>
                        
                        <p class="text-xs md:text-sm font-bold italic text-slate-800 leading-snug flex justify-center items-center gap-1">
                            <span>"${firstLine}</span>
                            <span class="inline-block border-b-2 border-dashed px-3 py-0.5 text-xs font-black bg-white rounded text-purple-700 font-sans">${state.poetrySelectedWord || "???"}</span>
                            <span>${ending}"</span>
                        </p>
                    </div>

                    <div class="space-y-4">
                        <div class="flex gap-2 justify-center flex-wrap select-none">${optionsHtml}</div>

                        <div class="flex justify-center gap-2 select-none">
                            ${!state.poetrySolved ? `
                                <button onclick="poetryCheckWord()" ${!state.poetrySelectedWord ? "disabled" : ""} class="bg-purple-500 hover:bg-purple-600 border-b-4 border-purple-700 disabled:opacity-50 text-white font-black text-xs py-2 px-6 rounded-lg active:translate-y-0.5 whitespace-nowrap cursor-pointer">Provar Rima Real ✍️</button>
                            ` : `
                                <div class="space-y-4 w-full">
                                    <div class="bg-green-50 border border-green-200 p-3.5 rounded-xl text-center text-[10.5px] text-green-950 font-bold leading-relaxed max-w-xs mx-auto">
                                        <p>Rima mágica correta e validada! ✨</p>
                                        <p class="text-[9px] text-slate-500 font-medium italic mt-1 font-serif leading-tight">"${current.trivia}"</p>
                                    </div>
                                    ${state.poetryPoemIdx === 14 && !achievements.find(a => a.id === "poeta_estrelas")?.unlocked ? `
                                        <div class="bg-amber-100 border border-[#FFD93D] text-amber-950 font-black p-3 rounded-xl text-[9px] w-max mx-auto text-center leading-none">🏆 Conquistaste o Selo de "Mestre da Lira" no Cabinet das Recompensas (+180 XP)!</div>
                                    ` : ""}
                                    <button onclick="poetryNextPoem()" class="bg-purple-600 hover:bg-purple-700 border-purple-800 border-b-4 text-white text-xs font-black py-2 px-6 rounded-xl block mx-auto whitespace-nowrap active:translate-y-0.5 cursor-pointer">${state.poetryPoemIdx + 1 < POEMS.length ? "Próximo Enigma de Verso" : "Voltar ao Primeiro Enigma"}</button>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        function poetrySelectWord(word) {
            if (state.poetrySolved) return;
            state.poetrySelectedWord = word;
            playClickSound();
            render();
        }

        function poetryCheckWord() {
            const current = POEMS[state.poetryPoemIdx];
            if (state.poetrySelectedWord === current.correctAnswer) {
                playSuccessSound();
                state.poetrySolved = true;
                if (!state.poetryPointsGiven) {
                    addPoints(15);
                    state.poetryPointsGiven = true;
                }
                
                // If completed 15 riddles in total
                if (state.poetryPoemIdx === 14) {
                    unlockAchievement("poeta_estrelas");
                }
            } else {
                playFailSound();
                state.poetrySelectedWord = null;
            }
            render();
        }

        function poetryNextPoem() {
            if (state.poetryPoemIdx + 1 < POEMS.length) {
                state.poetryPoemIdx++;
            } else {
                state.poetryPoemIdx = 0;
            }
            state.poetrySelectedWord = null;
            state.poetrySolved = false;
            state.poetryPointsGiven = false;
            playClickSound();
            render();
        }


        // --- SUBVIEW 5: GABINETE DAS RECOMPENSAS ---
        function renderRewards(parent) {
            const unlockedCount = achievements.filter(a => a.unlocked).length;
            const currentLevel = Math.floor(state.points / 100) + 1;
            const nextLevelPoints = currentLevel * 100;
            const progressPercent = Math.min(100, ((state.points % 100) / 100) * 100);

            const titles = ["Grão-Vassalo", "Fidalgo do Reino", "Navegador de Sagres", "Conde de Guimarães", "Duque de Ourique"];
            const titleTarget = currentLevel >= 5 ? "Duque de Ourique" : titles[currentLevel - 1] || "Grão-Vassalo";

            let listHtml = achievements.map((ach, idx) => `
                <div class="p-3.5 border-4 rounded-[20px] flex gap-3 items-center transition-all ${
                    ach.unlocked ? "bg-white border-[#046A38] shadow hover:scale-101" : "bg-slate-105 border-slate-200 opacity-60 saturate-50"
                }">
                    <div class="w-11 h-11 rounded-xl flex items-center justify-center text-2xl shrink-0 shadow-md border-2 border-white ${
                        ach.unlocked ? ach.badgeColor + " text-white" : "bg-slate-200 text-slate-400"
                    }">${ach.unlocked ? ach.icon : "🔒"}</div>
                    <div class="leading-snug text-left select-none">
                        <div class="flex items-center gap-1 flex-wrap">
                            <h4 class="font-extrabold text-xs text-slate-800 leading-none">${ach.title}</h4>
                            ${ach.unlocked ? `<span class="bg-green-150 text-[7.5px] text-green-700 px-1 py-0.2 rounded font-black">UNLOCKED</span>` : ""}
                        </div>
                        <p class="text-[9.5px] text-slate-500 font-semibold leading-normal mt-0.5">${ach.description}</p>
                        <span class="inline-block text-[8px] font-black bg-[#FFFBEB] text-[#B45309] px-1.5 py-0.5 rounded border border-[#FFD93D] mt-1">+${ach.points} XP Real</span>
                    </div>
                </div>
            `).join("");

            parent.innerHTML = `
                <div class="space-y-6">
                    <!-- Progress meter -->
                    <div class="bg-[#FFD93D] rounded-[24px] p-5 text-amber-950 border-4 border-[#B45309] shadow justify-between gap-5 flex flex-col md:flex-row relative overflow-hidden select-none">
                        <div class="flex items-center gap-4 text-center md:text-left flex-col md:flex-row">
                            <div class="w-13 h-13 rounded-full bg-white flex items-center justify-center border-4 border-amber-900 text-2xl font-black shrink-0 shadow-inner">${state.studentAvatar}</div>
                            <div class="leading-tight text-left">
                                <p class="text-[8.5px] font-black uppercase text-amber-900 leading-none">O vosso dote de fidalgo real</p>
                                <h2 class="text-base md:text-lg font-black tracking-tight mt-1 text-slate-900 heading-font">${state.studentName || "Recruta da Cúpula"} • ${titleTarget}</h2>
                                <p class="text-[9.5px] font-bold mt-1 text-amber-90">🪙 ${state.points} Pontos Reais de Experiência acumulados</p>
                            </div>
                        </div>

                        <div class="w-full md:w-52 space-y-1.5 shrink-0 select-none">
                            <div class="flex justify-between text-[8px] font-black uppercase">
                                <span>Cargo Lvl ${currentLevel}</span>
                                <span>Lvl ${currentLevel + 1} (${state.points}/${nextLevelPoints})</span>
                            </div>
                            <div class="w-full h-3 bg-amber-950/20 rounded-full overflow-hidden p-0.5">
                                <div class="h-full bg-amber-950 rounded-full transition-all duration-300" style="width: ${progressPercent}%"></div>
                            </div>
                            <p class="text-center text-[8.5px] font-black italic text-amber-900">Faltam ${nextLevelPoints - state.points} XP para o próximo dota coroado!</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
                        <!-- Left pane: medals list -->
                        <div class="lg:col-span-7 space-y-4">
                            <h3 class="text-xs md:text-sm font-black text-slate-800 flex items-center gap-1.5 heading-font select-none"><span>🏆</span> Medalhas e Títulos Reais (${unlockedCount}/${achievements.length})</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
                                ${listHtml}
                            </div>
                        </div>

                        <!-- Right pane: interactive Heraldry Coat of Arms constructor -->
                        <div class="lg:col-span-5 bg-white border-4 border-[#DA291C] rounded-[24px] p-5 space-y-5 shadow flex flex-col justify-between">
                            <div class="space-y-1.5 text-center select-none">
                                <span class="bg-red-50 text-[#DA291C] font-black border border-red-200 text-[8.5px] uppercase px-3 py-0.5 rounded-full inline-block">Armaria Militar</span>
                                <h3 class="font-black text-base text-slate-800 leading-none mt-1 head-font">Brasão de Cavalaria de Portugal</h3>
                                <p class="text-[9.5px] text-slate-500 font-semibold leading-normal mt-1">Gera o teu brasão de armas tradicional de fidalgo. Mostra aos heróis no chat para avaliarem!</p>
                            </div>

                            <div class="my-3.5 flex justify-center items-center">
                                <div id="shield-preview" class="w-24 h-32 border-[5px] rounded-t-full rounded-b-[40%] flex flex-col items-center justify-center shadow-md relative transition-all duration-150 ${state.shieldColor}">
                                    <div id="shield-symbol-view" class="text-4.5xl animate-pulse">${state.shieldSymbol}</div>
                                    <span class="absolute bottom-2.5 text-center w-full px-1"><span class="text-[7px] font-black uppercase tracking-wider bg-black/30 rounded px-1 text-white select-none">PORTUGAL</span></span>
                                </div>
                            </div>

                            <div class="space-y-3 font-semibold">
                                <div class="space-y-1 text-left">
                                    <label class="text-[8.5px] font-black uppercase text-slate-400 select-none">Título do teu Escudo:</label>
                                    <input type="text" id="shield-write-name" value="${state.shieldName}" class="w-full bg-white border-2 border-slate-200 rounded-xl px-3 py-1.8 text-xs font-black text-slate-800 focus:outline-none focus:border-red-400 shadow-inner" oninput="rewardsChangeShieldName(this.value)" maxlength="24">
                                </div>

                                <div class="space-y-1.5 text-left select-none">
                                    <span class="text-[8.5px] font-black text-slate-404 uppercase">Fundo Tradicional: <span class="text-[#DA291C]" id="shield-bg-label">${state.shieldBgLabel}</span></span>
                                    <div class="flex gap-2 flex-wrap">
                                        <button onclick="rewardsChangeBg('bg-[#DA291C] border-[#B45309] text-yellow-300', 'Vermelho Real')" class="w-5 h-5 rounded-full bg-red-650 border-2 border-white ring-1 ring-red-800 hover:scale-110 cursor-pointer transition-transform"></button>
                                        <button onclick="rewardsChangeBg('bg-[#046A38] border-[#166534] text-amber-200', 'Verde Esperança')" class="w-5 h-5 rounded-full bg-emerald-700 border-2 border-white ring-1 ring-emerald-800 hover:scale-110 cursor-pointer transition-transform"></button>
                                        <button onclick="rewardsChangeBg('bg-[#005CAD] border-[#075985] text-yellow-150', 'Azul Marítimo')" class="w-5 h-5 rounded-full bg-blue-700 border-2 border-white ring-1 ring-blue-800 hover:scale-110 cursor-pointer transition-transform"></button>
                                        <button onclick="rewardsChangeBg('bg-[#FFD93D] border-[#B45309] text-amber-950', 'Dourado Coroa')" class="w-5 h-5 rounded-full bg-amber-400 border-2 border-white ring-1 ring-amber-600 hover:scale-110 cursor-pointer transition-transform"></button>
                                    </div>
                                </div>

                                <div class="space-y-1.5 text-left select-none">
                                    <span class="text-[8.5px] font-black text-slate-400 uppercase">Brasão Central:</span>
                                    <div class="flex gap-2">
                                        ${["👑", "⛵", "⚔️", "🏰", "🦉"].map(sym => `
                                            <button onclick="rewardsChangeSymbol('${sym}')" class="text-lg p-1.5 bg-white border-2 border-slate-200 hover:scale-110 rounded-lg cursor-pointer transition-transform ${state.shieldSymbol === sym ? "border-[#DA291C] bg-red-50 text-red-900" : ""}"><span>${sym}</span></button>
                                        `).join("")}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function rewardsChangeShieldName(val) {
            state.shieldName = val.substring(0, 32);
            saveProgress();
        }

        function rewardsChangeBg(colorClasses, label) {
            state.shieldColor = colorClasses;
            state.shieldBgLabel = label;
            document.getElementById("shield-preview").className = `w-24 h-32 border-[5px] rounded-t-full rounded-b-[40%] flex flex-col items-center justify-center shadow-md relative transition-all duration-150 ${colorClasses}`;
            document.getElementById("shield-bg-label").innerText = label;
            playClickSound();
            saveProgress();
        }

        function rewardsChangeSymbol(sym) {
            state.shieldSymbol = sym;
            document.getElementById("shield-symbol-view").innerText = sym;
            playClickSound();
            saveProgress();
            render();
        }


        // MAIN RENDER SELECTOR SWITCH
        function render() {
            const container = document.getElementById("viewport");
            if (!container) return;

            if (state.activeTab === "timeline") {
                renderTimeline(container);
            } else if (state.activeTab === "map") {
                renderMap(container);
            } else if (state.activeTab === "chat") {
                renderChat(container);
            } else if (state.activeTab === "games") {
                renderGames(container);
            } else if (state.activeTab === "rewards") {
                renderRewards(container);
            }

            // Save state immediately
            saveProgress();
        }

        // ENTRY MOUNT HANDLER
        window.addEventListener("DOMContentLoaded", () => {
            loadProgress();
            lucide.createIcons();

            // Setup and trigger initial view state
            changeTab("timeline");

            // Check if name is empty, if so, trigger force registration step overlay popup
            if (!state.studentName) {
                setTimeout(() => {
                    openProfileModal(true);
                }, 100);
            }
        });
    </script>
</body>
</html>
