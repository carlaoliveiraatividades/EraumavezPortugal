        // Save and Load logic via LocalStorage
        function saveProgress() {
            try {

                localStorage.setItem("portugal_hist_achievements_onefile", JSON.stringify(achievements));
            } catch (e) {
                console.warn("Storage save failed:", e);
            }
        }

        function loadProgress() {
            try {
                const points = localStorage.getItem("portugal_hist_points_onefile");
                const achs = localStorage.getItem("portugal_hist_achievements_onefile");
                if (points) state.points = parseInt(points, 10);
                if (achs) {
                    achievements = JSON.parse(achs);
                } else {
                    resetAchievementsToDefault();
                }
            } catch (e) {
                resetAchievementsToDefault();
            }
            updateHUD();
        }

        function unlockAchievement(id) {
            let found = achievements.find(a => a.id === id);
            if (found && !found.unlocked) {

                playAchievementSound();
                updateHUD();
                saveProgress();

                notice.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-amber-500 text-white font-black px-6 py-3 rounded-full shadow-2xl border-4 border-white text-xs z-50 animate-bounce cursor-pointer";

        function updateHUD() {
            const currentLevel = Math.floor(state.points / 100) + 1;
            const levelTitles = ["Grão-Vassalo", "Fidalgo", "Navegador", "Conde", "Duque"];
            const levelTitleTarget = currentLevel >= 5 ? "Duque" : levelTitles[currentLevel - 1] || "Grão-Vassalo";

            document.getElementById("hud-level-title").innerText = levelTitleTarget;
            document.getElementById("hud-level-num").innerText = currentLevel;
            document.getElementById("hud-xp-points").innerText = `${state.points} XP`;
        }

        // --- SYNCHRONIZED AUDIO ENGINE ---
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) {
                const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
                if (AudioCtxClass) audioCtx = new AudioCtxClass();
            }
            if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
            return audioCtx;
        }

        function playClickSound() {
            try {
                const ctx = getAudioContext(); if (!ctx) return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = "sine";
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }

        function playSuccessSound() {
            try {
                const ctx = getAudioContext(); if (!ctx) return;
                const now = ctx.currentTime;
                const notes = [523.25, 783.99, 1046.50];
                notes.forEach((freq, idx) => {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = "sine";
                    osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    gain.gain.setValueAtTime(0, now + idx * 0.08);
                    gain.gain.linearRampToValueAtTime(0.1, now + idx * 0.08 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.14);
                    osc.start(now + idx * 0.08); osc.stop(now + idx * 0.08 + 0.18);
                });
            } catch(e) {}
        }

        function playFailSound() {
            try {
                const ctx = getAudioContext(); if (!ctx) return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = "triangle";
                osc.frequency.setValueAtTime(170, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.12, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                osc.start(); osc.stop(ctx.currentTime + 0.28);
            } catch(e) {}
        }

        function playAchievementSound() {
            try {
                const ctx = getAudioContext(); if (!ctx) return;
                const now = ctx.currentTime;
                const chord = [261.63, 329.63, 392.00, 523.25];
                chord.forEach((freq, idx) => {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = "sawtooth";
                    osc.frequency.setValueAtTime(freq, now + idx * 0.06);
                    gain.gain.setValueAtTime(0, now + idx * 0.06);
                    gain.gain.linearRampToValueAtTime(0.06, now + idx * 0.06 + 0.04);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.06 + 0.28);
                    osc.start(now + idx * 0.06); osc.stop(now + idx * 0.06 + 0.32);
                });
            } catch(e) {}
        }

        function playWaveSound() {
            try {
                const ctx = getAudioContext(); if (!ctx) return;
                const now = ctx.currentTime;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = "sine";
                osc.frequency.setValueAtTime(140, now);
                osc.frequency.exponentialRampToValueAtTime(170, now + 0.3);
                osc.frequency.exponentialRampToValueAtTime(125, now + 0.8);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.06, now + 0.3);
                gain.gain.linearRampToValueAtTime(0.005, now + 0.8);
                osc.start(); osc.stop(now + 0.82);
            } catch(e) {}
        }

        function chatSelectChar(key) {
            state.selectedCharKey = key;
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            state.isSpeaking = false;
            playClickSound();
            render();
        }

        function chatToggleSpeak() {
            playClickSound();
            if (!("speechSynthesis" in window)) return alert("Speech Synthesis não suportado neste browser.");
            
            if (state.isSpeaking) {
                window.speechSynthesis.cancel();
                state.isSpeaking = false;
                render();
                return;
            }

            const messages = state.chatMessages[state.selectedCharKey] || [];
            if (!messages.length) {
                const char = HISTORICAL_CHARACTERS.find(c => c.key === state.selectedCharKey);
                if (char) messages.push({ role: "model", text: char.greeting });
            }
            const lastText = messages[messages.length - 1]?.text || "";
            if (!lastText) return;

            const cleanText = lastText.replace(/[*#_\[\]]/g, "");
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            const voices = window.speechSynthesis.getVoices();
            let voice = voices.find(v => v.lang === "pt-PT") || voices.find(v => v.lang.startsWith("pt"));
            if (voice) utterance.voice = voice;

            utterance.onend = () => { state.isSpeaking = false; render(); };
            utterance.onerror = () => { state.isSpeaking = false; render(); };

            state.isSpeaking = true;
            window.speechSynthesis.speak(utterance);
            render();
        }

        function chatHandleKeyDown(e) {
            if (e.key === "Enter") chatSendMessage();
        }

        function chatSendPredefined(text) {
            chatSendMessage(text);
        }

        async function chatSendMessage(customText) {
            const input = document.getElementById("chat-write-input");
            const text = (customText || input?.value || "").trim();
            if (!text || state.chatIsLoading) return;

            if (input) input.value = "";
            playClickSound();

            let msgs = state.chatMessages[state.selectedCharKey];
            if (!msgs) {
                const char = HISTORICAL_CHARACTERS.find(c => c.key === state.selectedCharKey);
                msgs = [{ role: "model", text: char.greeting }];
            }

            msgs.push({ role: "user", text: text });
            state.chatMessages[state.selectedCharKey] = msgs;
            state.chatIsLoading = true;
            render();

            try {
                // Post locally
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        character: state.selectedCharKey,
                        prompt: text,
                        history: msgs.slice(1, -1)
                    })
                });

                if (!response.ok) throw new Error("Server fail");
                const data = await response.json();
                
                msgs.push({ role: "model", text: data.reply });
                addPoints(15);
                unlockAchievement("conversa_imperio");
            } catch (err) {
                // Fallback simulation
                const simulationReply = simulateHeroReply(state.selectedCharKey, text);
                msgs.push({ role: "model", text: simulationReply });
                addPoints(15);
                unlockAchievement("conversa_imperio");
            } finally {
                state.chatIsLoading = false;
                render();
                autoSpeakReply();
            }
        }

        function autoSpeakReply() {
            if ("speechSynthesis" in window && state.isSpeaking) {
                window.speechSynthesis.cancel();
                const msgs = state.chatMessages[state.selectedCharKey];
                const last = msgs[msgs.length - 1]?.text || "";
                const clean = last.replace(/[*#_\[\]]/g, "");
                const utterance = new SpeechSynthesisUtterance(clean);
                const voices = window.speechSynthesis.getVoices();
                let voice = voices.find(v => v.lang === "pt-PT") || voices.find(v => v.lang.startsWith("pt"));
                if (voice) utterance.voice = voice;
                utterance.onend = () => { state.isSpeaking = false; render(); };
                utterance.onerror = () => { state.isSpeaking = false; render(); };
                window.speechSynthesis.speak(utterance);
            }
        }

        function simulateHeroReply(charKey, text) {

            if (query.includes("heterónimos") || query.includes("nomes") || query.includes("outro")) {

            if (query.includes("café") || query.includes("baixa") || query.includes("brasileira")) {
                 return "Adoro sentar-me a saborear uma saborosa bica forte nas mesas de 'A Brasileira' da Baixa de Lisboa, rascunhando rimas misteriosas e filosofias de vida em pequenos guardanapos de papel amarelado.";
            }
            if (query.includes("sonho") || query.includes("frase") || query.includes("alma")) {
                 return "Escrevi para o tempo de Portugal: 'Deus quer, o homem sonha, a obra nasce!' Mantém o olhar focado nos astros e recorda que 'tudo vale a pena se a alma não for pequena'!";
            }
            return "Boa tarde, pequeno sonhador. Junta-te à minha mesa de café na Baixa de Lisboa para rascunharmos poesias sobre heterónimos e as quinas eternas do nosso fado!";

        // --- SUBVIEW 4: GAMES & QUIZZES ---
        function renderGames(parent) {
            let selectorHtml = `
                <div class="flex flex-col sm:flex-row items-center justify-between gap-4 bg-white p-5 rounded-[24px] border-4 border-[#046A38] shadow-sm select-none">

                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="gamesSelectTab('quiz')" class="flex-1 sm:flex-none px-3 py-2 rounded-xl text-[10px] md:text-xs font-black border-2 transition-all ${
                            state.activeGame === "quiz" ? "bg-[#FFD93D] border-[#B45309] text-amber-950 font-black shadow-xs" : "bg-white border-slate-200 text-slate-500 hover:text-slate-800"

                        <button onclick="gamesSelectTab('ocean')" class="flex-1 sm:flex-none px-3 py-2 rounded-xl text-[10px] md:text-xs font-black border-2 transition-all ${
                            state.activeGame === "ocean" ? "bg-[#E0F2FE] border-[#0369A1] text-sky-950 font-black shadow-xs" : "bg-white border-slate-200 text-slate-500 hover:text-slate-800"
                        }">⛵ Rota das Caravelas</button>
                        <button onclick="gamesSelectTab('poetry')" class="flex-1 sm:flex-none px-3 py-2 rounded-xl text-[10px] md:text-xs font-black border-2 transition-all ${
                            state.activeGame === "poetry" ? "bg-[#F3E8FF] border-[#7E22CE] text-purple-950 font-black shadow-xs" : "bg-white border-slate-200 text-slate-500 hover:text-slate-800"
                        }">✍️ Enigma dos Poetas</button>
                    </div>
                </div>
            `;

            let activityHtml = "";
            if (state.activeGame === "quiz") {
                activityHtml = renderQuizGame();
            } else if (state.activeGame === "ocean") {
                activityHtml = renderOceanGame();
            } else if (state.activeGame === "poetry") {
                activityHtml = renderPoetryGame();
            }

            parent.innerHTML = `
                <div class="space-y-6">
                    ${selectorHtml}
                    <div>
                        ${activityHtml}
                    </div>
                </div>
            `;
        }

        function gamesSelectTab(tab) {
            state.activeGame = tab;
            playClickSound();
            render();
        }

        // GAME A: QUIZ
        function renderQuizGame() {
            const filterQuestions = QUIZ_QUESTIONS.filter(q => q.eraId === state.quizSelectedEra);
            const currentQuestion = filterQuestions[state.quizCurrentIdx];

            let eraChooserHtml = [
                { id: "fundacao", name: "🏰 Fundação", color: "bg-amber-100 hover:bg-amber-200 text-amber-950 border-amber-200" },
                { id: "descobrimentos", name: "⛵ Descobrimentos", color: "bg-sky-100 hover:bg-sky-200 text-sky-950 border-sky-200" },
                { id: "crise_restauracao", name: "👑 Restauração", color: "bg-rose-100 hover:bg-rose-200 text-rose-950 border-rose-200" },
                { id: "revolucao_republica", name: "🚂 República", color: "bg-emerald-100 hover:bg-emerald-200 text-emerald-950 border-emerald-250" },
                { id: "democracia", name: "🕊️ Democracia", color: "bg-purple-100 hover:bg-purple-200 text-purple-950 border-purple-200" }
            ].map(era => `
                <button onclick="quizChangeEra('${era.id}')" class="px-3 py-1.5 rounded-lg text-[10px] font-black border-2 transition-all shrink-0 ${
                    state.quizSelectedEra === era.id ? "bg-amber-500 border-amber-600 text-white shadow" : era.color
                }">${era.name}</button>
            `).join("");

            if (state.quizShowSummary) {
                let unlockedCoroa = achievements.find(a => a.id === "coroa_afonso")?.unlocked;
                return `
                    <div class="bg-white border-4 border-[#FFD93D] rounded-[24px] p-6 max-w-md mx-auto text-center space-y-5 shadow-sm">
                        <div class="text-5xl animate-bounce">🏆</div>
                        <div class="space-y-1 leading-none">
                            <h3 class="text-base font-black text-blue-950">Fim do Quiz Temático!</h3>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Pontos e sabedoria conquistados no século</p>
                        </div>
                        <div class="w-24 h-24 rounded-full bg-amber-50 border-4 border-amber-400 flex items-center justify-center text-2xl font-black text-amber-950 mx-auto shadow-inner">
                            ${state.quizScore}/${filterQuestions.length}
                        </div>
                        <p class="text-xs text-slate-600 leading-normal font-semibold">
                            ${state.quizScore === 3 ? "Incrível! Mereces a espada de ouro da guarda do Rei Afonso! Acertaste em tudo!" : state.quizScore === 2 ? "Muito bom esforço! Já dominas grandes mistérios da heráldica!" : "Bom esforço! Torna a tentar e conseguirás a nota de ouro real!"}
                        </p>
                        ${state.quizSelectedEra === "fundacao" && state.quizScore >= 2 && !unlockedCoroa ? `
                            <div class="bg-green-50 text-green-800 text-[10px] font-bold p-3 border-2 border-dashed border-green-300 rounded-xl">👑 Desbloqueaste a Conquista "Cavaleiro do Reino" no Armário das Recompensas!</div>
                        ` : ''}
                        <button onclick="quizReset()" class="w-full bg-slate-100 hover:bg-slate-200 border border-slate-250 font-black text-xs py-2.5 rounded-xl flex items-center justify-center gap-1.5"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Responder de Novo</button>
                    </div>
                `;
            }

            let optionsHtml = currentQuestion.options.map((opt, oIdx) => {
                const remainsUnanswered = !state.quizIsAnswered;
                const isSelected = state.quizSelectedOption === oIdx;
                const isCorrectOpt = oIdx === currentQuestion.correctAnswer;
                
                let optStyles = "bg-white border-2 border-slate-100 hover:border-slate-350";
                if (remainsUnanswered && isSelected) {
                    optStyles = "bg-amber-100 border-amber-400 text-amber-950 ring-2 ring-amber-150";
                } else if (state.quizIsAnswered) {
                    if (isCorrectOpt) {
                        optStyles = "bg-green-100 border-green-500 text-green-950 ring-2 ring-green-150";
                    } else if (isSelected) {
                        optStyles = "bg-rose-100 border-rose-450 text-rose-950 ring-2 ring-rose-150";
                    } else {
                        optStyles = "bg-slate-50 border-slate-100 opacity-50";
                    }
                }

                let badge = String.fromCharCode(65 + oIdx);
                let checkBadge = `bg-slate-100 text-slate-700`;
                if (state.quizIsAnswered && isCorrectOpt) checkBadge = 'bg-green-500 text-white';
                else if (state.quizIsAnswered && isSelected) checkBadge = 'bg-rose-500 text-white';
                else if (isSelected) checkBadge = 'bg-amber-400 text-amber-950';

                return `
                    <button onclick="quizSelectOption(${oIdx})" ${state.quizIsAnswered ? "disabled" : ""} class="w-full text-left p-3.5 rounded-xl text-[11px] font-semibold transition-all duration-100 flex items-center gap-3 ${optStyles}">
                        <span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 ${checkBadge}">${badge}</span>
                        <span class="flex-1 leading-snug">${opt}</span>
                    </button>
                `;
            }).join("");

            let feedbackHtml = "";
            if (state.quizIsAnswered) {
                const correct = state.quizSelectedOption === currentQuestion.correctAnswer;
                feedbackHtml = `
                    <div class="p-3.5 rounded-xl border-2 ${correct ? "bg-green-50 border-green-200 text-green-950" : "bg-amber-50 border-amber-200 text-amber-950"} space-y-1">
                        <div class="flex items-center gap-1 font-bold text-xs">
                            <span>${correct ? "✅" : "⚠️"}</span>
                            <span class="font-black uppercase">${correct ? "Exato! Grandioso!" : "Coragem, aprende com o erro!"}</span>
                        </div>
                        <p class="text-[10px] md:text-xs font-semibold leading-relaxed">${currentQuestion.explanation}</p>
                    </div>
                `;
            }

            return `
                <div class="bg-white border-4 border-[#FFD93D] rounded-[24px] p-5 md:p-6 space-y-5 shadow-sm">
                    <div class="space-y-1.5 select-none">
                        <span class="text-[9px] font-black uppercase text-amber-800 leading-none block">Século e Tema do Saber:</span>
                        <div class="flex gap-1.5 overflow-x-auto pb-1.5 shrink-0 scrollbar-none">${eraChooserHtml}</div>
                    </div>

                    <div class="flex justify-between items-center text-[10px] font-black text-amber-900 border-b pb-2">
                        <span class="uppercase">Quiz Portugal</span>
                        <span>Pergunta ${state.quizCurrentIdx + 1} de ${filterQuestions.length}</span>
                    </div>

                    <h3 class="text-sm md:text-base font-black text-blue-950 leading-snug">${currentQuestion.question}</h3>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        ${optionsHtml}
                    </div>

                    ${feedbackHtml}

                    <div class="flex justify-end pt-1">
                        ${!state.quizIsAnswered ? `
                            <button onclick="quizConfirmAnswer()" ${state.quizSelectedOption === null ? "disabled" : ""} class="bg-amber-500 hover:bg-amber-600 disabled:opacity-50 text-white font-black text-xs py-2 px-5 rounded-lg border-b-4 border-amber-700 active:translate-y-0.5 whitespace-nowrap">Confirmar Resposta 📜</button>
                        ` : `
                            <button onclick="quizNextQuestion()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black text-xs py-2 px-5 rounded-lg border-b-4 border-emerald-800 active:translate-y-0.5 whitespace-nowrap">${state.quizCurrentIdx + 1 < filterQuestions.length ? "Seguinte Pergunta ➡️" : "Ver Resultados 🏆"}</button>
                        `}
                    </div>
                </div>
            `;
        }

        function quizChangeEra(id) {
            state.quizSelectedEra = id;
            state.quizCurrentIdx = 0;
            state.quizSelectedOption = null;
            state.quizIsAnswered = false;
            state.quizScore = 0;
            state.quizShowSummary = false;
            playClickSound();
            render();
        }

        function quizSelectOption(optIdx) {
            if (state.quizIsAnswered) return;
            state.quizSelectedOption = optIdx;
            playClickSound();
            render();
        }

        function quizConfirmAnswer() {
            if (state.quizIsAnswered || state.quizSelectedOption === null) return;
            state.quizIsAnswered = true;
            const filterQuestions = QUIZ_QUESTIONS.filter(q => q.eraId === state.quizSelectedEra);
            const curQ = filterQuestions[state.quizCurrentIdx];

            if (state.quizSelectedOption === curQ.correctAnswer) {
                playSuccessSound();
                state.quizScore++;
                addPoints(25);
            } else {
                playFailSound();
            }
            render();
        }

        function quizNextQuestion() {
            const filterQuestions = QUIZ_QUESTIONS.filter(q => q.eraId === state.quizSelectedEra);
            if (state.quizCurrentIdx + 1 < filterQuestions.length) {
                state.quizCurrentIdx++;
                state.quizSelectedOption = null;
                state.quizIsAnswered = false;
                playClickSound();
                render();
            } else {
                state.quizShowSummary = true;
                if (state.quizSelectedEra === "fundacao" && state.quizScore >= 2) {
                    unlockAchievement("coroa_afonso");
                }
                playClickSound();
                render();
            }
        }

        function quizReset() {
            state.quizCurrentIdx = 0;
            state.quizSelectedOption = null;
            state.quizIsAnswered = false;
            state.quizScore = 0;
            state.quizShowSummary = false;
            playClickSound();
            render();
        }

        // GAME B: CARAVELAS (OCEAN)
        const SCENARIOS = [
            {
                title: "Desafio 1: O Cabo das Tormentas 🌊",
                question: "Uma tempestade terrível fustiga as caravelas de Bartolomeu Dias! Ondas do tamanho de muralhas ameaçam quebrar a madeira. O que decides fazer?",
                choices: [
                    { text: "Navegar ao largo em direção ao mar alto longe das rochas (Manobra Segura)", safe: true, successMsg: "Manobra genial! Desviaste-te das rochas e conseguiste passar o cabo com segurança!", failMsg: "" },
                    { text: "Aproximar o navio ao máximo da terra escura para ver o farol (Arriscado)", safe: false, successMsg: "", failMsg: "As correntes empurraram o navio ferozmente contra os recifes! Perdeste 1 coração." }
                ]
            },
            {
                title: "Desafio 2: O Gigante Adamastor 🐉",
                question: "Uma montanha de nuvens negras toma a forma uivante do lendário Adamastor! Ele ordena que rodem caravelas de volta a Lisboa. O que pretendes?",
                choices: [
                    { text: "Entrar em pânico e deitar as valiosas especiarias às águas para lhe acalmar", safe: false, successMsg: "", failMsg: "O gigante riu-se do teu medo e soprou forte tempestade nas velas! Perdeste 1 coração." },
                    { text: "Olhar alto para o astrolábio e recitar com fulgor uma cantiga livre", safe: true, successMsg: "Grandioso! Perante o teu berrante patriotismo, o gigante encolheu e derreteu-se em lágrimas salgadas!", failMsg: "" }
                ]
            },
            {
                title: "Desafio 3: O Oceano Índico 🏝️",
                question: "Chegas à entrada marítima da Índia sob calor abrasador. Para descer até Calecute rapidamente antes que quebrem os pães secos, o que fazes?",
                choices: [
                    { text: "Bolinar ao ziguezague usando as formosas velas latinas triangulares", safe: true, successMsg: "Perfeito! Aportaram gloriosamente em Calecute! O mar foi desbravado!", failMsg: "" },
                    { text: "Içar âncoras e aguardar calmos três meses para o vento rodar de borla", safe: false, successMsg: "", failMsg: "Os biscoitos de viagem criaram bolor e a marinharia adoeceu! Perdeste 1 coração." }
                ]
            }
        ];

        function renderOceanGame() {
            if (state.oceanIsGameOver) {
                return `
                    <div class="bg-white border-4 border-rose-300 rounded-[24px] p-6 max-w-sm mx-auto text-center space-y-4 shadow-sm select-none">
                        <div class="text-6xl">☠️⚓</div>
                        <h3 class="text-base font-black text-rose-950 leading-none">A Caravela Naufragou!</h3>
                        <p class="text-[11px] text-slate-500 font-semibold leading-relaxed">O gigante Adamastor levou a melhor perante o timão. Mas o verdadeiro grumete ergue-se e limpa o sal!</p>
                        <button onclick="oceanRestart()" class="w-full bg-sky-500 hover:bg-sky-600 hover:border-sky-800 text-white font-black text-xs py-2.5 rounded-xl border-b-4 border-sky-700 animate-pulse">Içar velas novamente ⛵</button>
                    </div>
                `;
            }

            if (state.oceanIsGameWon) {
                return `
                    <div class="bg-white border-4 border-green-300 rounded-[24px] p-6 max-w-md mx-auto text-center space-y-4 shadow-sm">
                        <div class="text-6xl animate-bounce">🍛🕌👑</div>
                        <span class="bg-green-100 text-green-700 text-[10px] font-black px-2 py-0.5 rounded-full border border-green-200 inline-block uppercase leading-none">VITÓRIA MARÍTIMA</span>
                        <h3 class="text-base font-black text-green-950 mt-1 leading-none">Ancoraste na Índia!</h3>
                        <p class="text-[11px] text-slate-500 leading-relaxed font-semibold">Trazes toneladas de pimenta e canela! Salvaguardaste as caravelas, derrotaste o monstro e os teus marinheiros festejam.</p>
                        <div class="bg-sky-50 text-[#0369A1] font-black border border-sky-100 rounded-xl p-3.5 text-[10px] leading-normal text-center">🏆 Recebeste a Medalha de <b>Navegador dos Sete Mares</b> no teu Cabine e ganhaste <b>+150 XP!</b></div>
                        <button onclick="oceanRestart()" class="w-full bg-[#046A38] hover:bg-[#166534] hover:border-green-800 text-white font-black text-xs py-2.5 rounded-xl border-b-4 border-[#075309]">Traçar Novo Rumo 🧭</button>
                    </div>
                `;
            }

            const current = SCENARIOS[state.oceanStep];

            let hearts = "";
            for (let i = 0; i < 3; i++) {
                hearts += i < state.oceanHp ? "❤️" : "🖤";
            }

            let choicesHtml = current.choices.map((ch, idx) => `
                <button onclick="oceanClickChoice(${ch.safe}, '${ch.successMsg.replace(/'/g, "\\'")}', '${ch.failMsg.replace(/'/g, "\\'")}')" class="w-full text-left bg-white hover:bg-sky-50 border-2 border-sky-200 rounded-xl p-3 text-[11px] font-semibold tracking-tight transition-all">${ch.text}</button>
            `).join("");

            return `
                <div class="bg-white border-4 border-[#7DD3FC] rounded-[24px] p-5 space-y-5 shadow-sm">
                    <div class="flex justify-between items-center text-[10px] font-black text-sky-950 border-b pb-2 flex-wrap gap-2">
                        <span class="uppercase flex items-center gap-1">⛵ Aventuras do Alto Mar</span>
                        <div class="flex gap-3 items-center">
                            <span>Vidas: <span class="tracking-wide">${hearts}</span></span>
                            <span class="bg-sky-50 border border-sky-200 px-2 rounded">Escala ${state.oceanStep + 1}/3</span>
                        </div>
                    </div>

                    <!-- Sea waves simulation -->
                    <div class="bg-sky-50 rounded-xl border border-sky-200 h-32 flex justify-center items-center relative overflow-hidden select-none">
                        <span class="text-7xl animate-[float_3s_infinite_ease-after] block relative z-10">⛵</span>
                        ${state.oceanStep === 1 ? `<span class="text-6.5xl absolute right-12 bottom-2 animate-pulse">🐉</span>` : ""}
                        ${state.oceanStep === 2 ? `<span class="text-6xl absolute right-14 bottom-4">🕌</span>` : ""}
                        <div class="absolute bottom-1 left-2 bg-white/70 px-1.5 rounded text-[8px] border font-mono">MAPA: ${state.oceanStep === 0 ? "Atlântico" : state.oceanStep === 1 ? "Cabo das Tormentas" : "Oceano Índico"}</div>
                    </div>

                    <div class="space-y-1">
                        <h4 class="text-xs font-black text-sky-950">${current.title}</h4>
                        <p class="text-[11px] text-slate-705 bg-slate-50 border p-3 rounded-lg leading-normal font-medium italic">"${current.question}"</p>
                    </div>

                    <div class="space-y-2">
                        ${choicesHtml}
                    </div>

                    <!-- Maritime logs -->
                    <div class="bg-slate-900 border border-slate-800 p-3 rounded-lg text-sky-400 font-mono text-[10px] leading-relaxed">
                        💻 DIÁRIO DE BORDO: <span class="font-sans font-semibold text-sky-200 leading-normal block mt-1">${state.oceanLog}</span>
                    </div>
                </div>
            `;
        }

        function oceanClickChoice(safe, succ, fail) {
            playClickSound();
            if (safe) {
                state.oceanLog = succ;
                playWaveSound();
                if (state.oceanStep + 1 >= 3) {
                    state.oceanIsGameWon = true;
                    unlockAchievement("mestre_caravela");
                    addPoints(150);
                } else {
                    state.oceanStep++;
                }
            } else {
                state.oceanLog = fail;
                playFailSound();
                state.oceanHp--;
                if (state.oceanHp <= 0) {
                    state.oceanIsGameOver = true;
                }
            }
            render();
        }

        function oceanRestart() {
            state.oceanStep = 0;
            state.oceanHp = 3;
            state.oceanIsGameOver = false;
            state.oceanIsGameWon = false;
            state.oceanLog = "Sais de Belém com as velas cheias! Rumo ao Cabo de África contornando tormentas.";
            playClickSound();
            render();
        }

        // GAME C: POETRY
        const POEMS = [
            {
                author: "Luís de Camões",
                context: "O amor é mistério e doce chama escreveu o mestre de um olho só:",
                verseLines: [
                    "Amor é fogo que arde sem se ver,",
                    "É ferida que dói e não se __________."
                ],
                correctAnswer: "sente",
                options: ["cura", "sente", "vê", "cala"],
                trivia: "Versos que toda a gente conhece e recita em Portugal."
            },
            {
                author: "Fernando Pessoa",
                context: "Alertando o bardo das letras a mirar nos mais luminosos horizontes:",
                verseLines: [
                    "Tudo vale a pena",
                    "Se a alma não for __________."
                ],
                correctAnswer: "pequena",
                options: ["escura", "cansada", "pequena", "zangada"],
                trivia: "Do livro lendário 'Mensagem', Pessoa ensina a amar novos horizontes."
            }
        ];

        function renderPoetryGame() {
            const current = POEMS[state.poetryPoemIdx];

            let optionsHtml = current.options.map(word => `
                <button onclick="poetrySelectWord('${word}')" ${state.poetrySolved ? "disabled" : ""} class="px-3.5 py-1.8 rounded-xl text-[10px] md:text-xs font-black border-2 transition-all hover:scale-105 ${
                    state.poetrySelectedWord === word ? "bg-purple-600 text-white border-purple-700 shadow" : "bg-white border-purple-200 text-purple-950 hover:bg-purple-100/50"
                }">${word}</button>
            `).join("");

            let firstLine = current.verseLines[1].split("__________")[0];
            let ending = current.verseLines[1].split("__________")[1];

            return `
                <div class="bg-white border-4 border-[#C084FC] rounded-[24px] p-5 space-y-5 shadow-sm">
                    <div class="flex justify-between items-center text-[10px] font-black text-purple-950 border-b pb-2">
                        <span>✍️ Enigma Versificado</span>
                        <span>Sábio: ${current.author}</span>
                    </div>

                    <p class="text-[10px] md:text-sn text-slate-500 italic text-center font-bold">"${current.context}"</p>

                    <!-- Scroll layout -->
                    <div class="bg-amber-50/50 border-2 border-amber-200 rounded-2xl p-6 shadow-inner text-center space-y-3 relative overflow-hidden max-w-sm mx-auto select-none font-serif">
                        <div class="text-[8px] tracking-wider text-amber-700 font-extrabold mb-1">📜 PERGAMINHO MÁGICO</div>
                        
                        <p class="text-xs md:text-sm font-bold italic text-slate-800 leading-snug">"${current.verseLines[0]}"</p>
                        
                        <p class="text-xs md:text-sm font-bold italic text-slate-800 leading-snug flex justify-center items-center gap-1">
                            <span>"${firstLine}</span>
                            <span class="inline-block border-b-2 border-dashed px-3 py-0.5 text-xs font-black bg-white rounded text-purple-700 font-sans">${state.poetrySelectedWord || "???"}</span>
                            <span>${ending}"</span>
                        </p>
                    </div>

                    <div class="space-y-4">
                        <div class="flex gap-2 justify-center flex-wrap">${optionsHtml}</div>

                        <div class="flex justify-center gap-2">
                            ${!state.poetrySolved ? `
                                <button onclick="poetryCheckWord()" ${!state.poetrySelectedWord ? "disabled" : ""} class="bg-purple-500 hover:bg-purple-600 border-b-4 border-purple-700 disabled:opacity-50 text-white font-black text-xs py-2 px-6 rounded-lg active:translate-y-0.5 whitespace-nowrap">Provar Rima Real ✍️</button>
                            ` : `
                                <div class="space-y-4 w-full">
                                    <div class="bg-green-50 border border-green-200 p-3.5 rounded-xl text-center text-[11px] text-green-950 font-bold leading-relaxed max-w-xs mx-auto">
                                        <p>Rima mágica correta e validada! ✨</p>
                                        <p class="text-[9px] text-slate-500 font-medium italic mt-1">"${current.trivia}"</p>
                                    </div>
                                    ${state.poetryPoemIdx === 1 && !achievements.find(a => a.id === "poeta_estrelas")?.unlocked ? `
                                        <div class="bg-amber-100 border border-amber-300 text-amber-950 font-bold p-2.5 rounded-xl text-[9px] w-max mx-auto text-center">🏆 Conquistaste a Estrela "Poeta das Estrelas" no Armário (+100 XP)!</div>
                                    ` : ""}
                                    <button onclick="poetryNextPoem()" class="bg-emerald-600 hover:bg-emerald-700 border-[#075309] border-b-4 text-white text-xs font-black py-2.5 px-6 rounded-xl block mx-auto whitespace-nowrap active:translate-y-0.5">${state.poetryPoemIdx + 1 < POEMS.length ? "Próximo Enigma de Verso" : "Voltar ao Primeiro Pergaminho"}</button>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        function poetrySelectWord(word) {
            if (state.poetrySolved) return;
            state.poetrySelectedWord = word;
            playClickSound();
            render();
        }

        function poetryCheckWord() {
            const current = POEMS[state.poetryPoemIdx];
            if (state.poetrySelectedWord === current.correctAnswer) {
                playSuccessSound();
                state.poetrySolved = true;
                if (!state.poetryPointsGiven) {
                    addPoints(50);
                    state.poetryPointsGiven = true;
                }
                if (state.poetryPoemIdx === 1) {
                    unlockAchievement("poeta_estrelas");
                }
            } else {
                playFailSound();
                state.poetrySelectedWord = null;
            }
            render();
        }

        function poetryNextPoem() {
            if (state.poetryPoemIdx + 1 < POEMS.length) {
                state.poetryPoemIdx++;
            } else {
                state.poetryPoemIdx = 0;
            }
            state.poetrySelectedWord = null;
            state.poetrySolved = false;
            state.poetryPointsGiven = false;
            playClickSound();
            render();
        }

        // --- SUBVIEW 5: REWARDS ---
        function renderRewards(parent) {
            const unlockedCount = achievements.filter(a => a.unlocked).length;
            const currentLevel = Math.floor(state.points / 100) + 1;
            const nextLevelPoints = currentLevel * 100;
            const progressPercent = Math.min(100, ((state.points % 100) / 100) * 100);

            const titles = ["Grão-Vassalo Iniciante", "Fidalgo Aprendiz", "Navegador de Sagres", "Conde de Guimarães", "Duque de Ourique"];
            const titleTarget = currentLevel >= 5 ? "Duque de Ourique" : titles[currentLevel - 1] || "Grão-Vassalo Iniciante";

            let listHtml = achievements.map((ach, idx) => `
                <div class="p-3.5 border-4 rounded-[20px] flex gap-3 items-center transition-all ${
                    ach.unlocked ? "bg-white border-[#046A38] shadow-sm hover:scale-101" : "bg-slate-50 border-slate-200 opacity-55 saturate-50"
                }">
                    <div class="w-11 h-11 rounded-xl flex items-center justify-center text-2xl shrink-0 shadow-md border-2 border-white ${
                        ach.unlocked ? ach.badgeColor + " text-white" : "bg-slate-200 text-slate-400"
                    }">${ach.unlocked ? ach.icon : "🔒"}</div>
                    <div class="leading-snug">
                        <div class="flex items-center gap-1">
                            <h4 class="font-extrabold text-xs text-slate-900 leading-none">${ach.title}</h4>
                            ${ach.unlocked ? `<span class="bg-green-100 text-[8px] text-green-700 px-1 py-0.2 rounded-full font-bold">OK</span>` : ""}
                        </div>
                        <p class="text-[10px] text-slate-500 font-semibold leading-normal mt-0.5">${ach.description}</p>
                        <span class="inline-block text-[8px] font-black bg-[#FFFBEB] text-[#B45309] px-1.5 py-0.5 rounded border border-[#FFD93D] mt-1">+${ach.points} XP Real</span>
                    </div>
                </div>
            `).join("");

            parent.innerHTML = `
                <div class="space-y-6">
                    <!-- Head level box banner -->
                    <div class="bg-[#FFD93D] rounded-[24px] p-5 text-amber-950 border-4 border-[#B45309] shadow-sm justify-between gap-5 flex flex-col md:flex-row relative overflow-hidden select-none">
                        <div class="flex items-center gap-4 text-center md:text-left flex-col md:flex-row">
                            <div class="w-14 h-14 rounded-full bg-white flex items-center justify-center border-4 border-amber-900 text-2xl font-black shrink-0 shadow-sm">${currentLevel}</div>
                            <div class="leading-tight">
                                <p class="text-[9px] font-black uppercase text-amber-900 leading-none">Cargos da Coroa lusa</p>
                                <h2 class="text-base md:text-lg font-black tracking-tight mt-1 text-slate-900">${titleTarget}</h2>
                                <p class="text-[10px] font-bold mt-1 text-amber-900">🪙 ${state.points} Pontos Reas de Experiência</p>
                            </div>
                        </div>

                        <div class="w-full md:w-52 space-y-1.5 shrink-0">
                            <div class="flex justify-between text-[9px] font-black uppercase">
                                <span>Lvl ${currentLevel}</span>
                                <span>Lvl ${currentLevel + 1} (${state.points}/${nextLevelPoints})</span>
                            </div>
                            <div class="w-full h-3.5 bg-amber-900/20 rounded-full overflow-hidden p-0.5">
                                <div class="h-full bg-amber-950 rounded-full transition-all duration-300" style="width: ${progressPercent}%"></div>
                            </div>
                            <p class="text-center text-[9px] font-black italic text-amber-900">Faltam ${nextLevelPoints - state.points} XP para subir o vosso dote real!</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                        <!-- Left pane: medals -->
                        <div class="lg:col-span-7 space-y-4">
                            <h3 class="text-base font-black text-slate-800 flex items-center gap-2"><span class="text-xl">🏆</span> Cofre de Símbolos (${unlockedCount}/${achievements.length})</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
                                ${listHtml}
                            </div>
                        </div>

                        <!-- Right pane: shield designer -->
                        <div class="lg:col-span-5 bg-white border-4 border-[#DA291C] rounded-[24px] p-5 space-y-5 shadow-sm relative">
                            <div class="text-center">
                                <span class="bg-red-50 text-[#DA291C] font-black border border-red-200 text-[9px] uppercase px-3 py-0.5 rounded-full inline-block">Armaria Cavaleira</span>
                                <h3 class="font-black text-base text-slate-800 mt-1">Brasão de Armas luso</h3>
                                <p class="text-[10px] text-slate-500 font-semibold leading-normal">Escolhe o símbolo, muda o teu fundo real e mostra aos heróis no chat de heróis!</p>
                            </div>

                            <div class="my-3.5 flex justify-center items-center">
                                <div id="shield-preview" class="w-28 h-36 border-[5px] rounded-t-full rounded-b-[40%] flex flex-col items-center justify-center shadow-md relative transition-all duration-150 ${state.shieldColor}">
                                    <div id="shield-symbol-view" class="text-5xl animate-pulse">${state.shieldSymbol}</div>
                                    <span class="absolute bottom-3 text-center w-full px-1.5"><span class="text-[7.5px] font-black uppercase tracking-wider bg-black/30 rounded px-1 text-white select-none">PORTUGAL</span></span>
                                </div>
                            </div>

                            <div class="space-y-3">
                                <!-- Title banner -->
                                <div class="space-y-1 text-xs">
                                    <label class="text-[9px] font-black uppercase text-slate-400">Nomeie o teu escudo:</label>
                                    <input type="text" id="shield-write-name" value="${state.shieldName}" class="w-full bg-white border-2 border-slate-200 rounded-lg px-2.5 py-1.2 text-xs font-black text-slate-800 focus:outline-none focus:border-red-400" oninput="rewardsChangeShieldName(this.value)">
                                </div>

                                <!-- Background select links -->
                                <div class="space-y-1.5">
                                    <span class="text-[9px] font-black text-slate-400 uppercase">Fundo Real: <span class="text-[#DA291C]" id="shield-bg-label">${state.shieldBgLabel}</span></span>
                                    <div class="flex gap-2 flex-wrap">
                                        <button onclick="rewardsChangeBg('bg-[#DA291C] border-[#B45309] text-yellow-300', 'Vermelho Real')" class="w-5 h-5 rounded-full bg-red-600 border-2 border-white ring-1 ring-red-850 hover:scale-105 transition-transform"></button>
                                        <button onclick="rewardsChangeBg('bg-[#046A38] border-[#166534] text-amber-200', 'Verde Esperança')" class="w-5 h-5 rounded-full bg-emerald-700 border-2 border-white ring-1 ring-emerald-850 hover:scale-105 transition-transform"></button>
                                        <button onclick="rewardsChangeBg('bg-[#0369A1] border-[#075985] text-yellow-150', 'Azul Marítimo')" class="w-5 h-5 rounded-full bg-sky-700 border-2 border-white ring-1 ring-sky-850 hover:scale-105 transition-transform"></button>
                                        <button onclick="rewardsChangeBg('bg-[#FFD93D] border-[#B45309] text-amber-950', 'Dourado Império')" class="w-5 h-5 rounded-full bg-amber-400 border-2 border-white ring-1 ring-amber-600 hover:scale-105 transition-transform"></button>
                                    </div>
                                </div>

                                <!-- Symbols selection -->
                                <div class="space-y-1.5">
                                    <span class="text-[9px] font-black text-slate-400 uppercase">Selo central:</span>
                                    <div class="flex gap-2.5">
                                        ${["👑", "⛵", "⚔️", "🏰", "🦉"].map(sym => `
                                            <button onclick="rewardsChangeSymbol('${sym}')" class="text-xl p-1 bg-white border-2 border-slate-200 hover:scale-110 md:hover:scale-115 rounded-lg transition-transform ${state.shieldSymbol === sym ? "border-[#DA291C] bg-red-50" : ""}">${sym}</button>
                                        `).join("")}
                                    </div>
                                </div>
                            </div>

                            <div class="pt-2 text-[9px] font-black text-red-900 border-t border-red-100 bg-red-50/70 -mx-5 -mb-5 p-3 rounded-b-[20px] text-center">🎉 Mostra este brasão de armas no chat para saberes se D. Afonso e a Rainha aprovam as tuas insígnias!</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function rewardsChangeShieldName(val) {
            state.shieldName = val.substring(0, 32);
            saveProgress();
        }

        function rewardsChangeBg(colorClasses, label) {
            state.shieldColor = colorClasses;
            state.shieldBgLabel = label;
            document.getElementById("shield-preview").className = `w-28 h-36 border-[5px] rounded-t-full rounded-b-[40%] flex flex-col items-center justify-center shadow-md relative transition-all duration-150 ${colorClasses}`;
            document.getElementById("shield-bg-label").innerText = label;
            playClickSound();
            saveProgress();
        }

        function rewardsChangeSymbol(sym) {
            state.shieldSymbol = sym;
            document.getElementById("shield-symbol-view").innerText = sym;
            playClickSound();
            saveProgress();
            render();
        }

        // On Mount setup
        window.addEventListener("load", () => {
            loadProgress();
            changeTab("timeline");
            // Warm speech voices list fetching
            if (window.speechSynthesis) {
                window.speechSynthesis.getVoices();
            }
        });
    </script>
</body>
</html>
